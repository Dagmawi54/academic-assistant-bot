services:
  - type: web
    name: academic-assistant-bot
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/bot.db
      - key: USE_POLLING
        value: "True"
      # These must be set securely in the Render Dashboard
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: academic-assistant-bot
          property: url
      - key: REDIS_URL
        fromService:
          type: redis
          name: bot-redis
          property: connectionString

  - type: redis
    name: bot-redis
    ipAllowList: [] # only allow internal connections
    plan: free
